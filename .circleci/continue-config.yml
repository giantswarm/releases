version: 2.1

# Pipeline parameters forwarded from the setup config (config.yml).
# These must be declared here to avoid "Unexpected argument(s)" errors.
parameters:
  provider:
    type: string
    default: ""
  release_version:
    type: string
    default: ""

orbs:
  architect: giantswarm/architect@9.5.5

# Static job definitions for the retag workflow.
# The workflows section is appended dynamically by the setup job in config.yml.

commands:
  install-yq:
    steps:
      - run:
          name: Install yq
          command: |
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq

  login-oci-registry:
    steps:
      - run:
          name: Login to OCI registry
          command: |
            echo "${ACR_GSOCI_PASSWORD}" | helm registry login gsoci.azurecr.io \
              --username "${ACR_GSOCI_USERNAME}" \
              --password-stdin

jobs:
  prepare-retag-chart:
    executor: architect/app-build-suite
    parameters:
      provider:
        type: string
      release_version:
        type: string
      chart_version:
        type: string
        default: ""
    steps:
      - checkout
      - install-yq
      - run:
          name: Parse release information
          command: |
            PROVIDER="<< parameters.provider >>"
            RELEASE_VERSION="<< parameters.release_version >>"
            RELEASE_VERSION_CLEAN="${RELEASE_VERSION#v}"

            # For PR preview builds, use the provided chart version for the OCI tag
            # while keeping RELEASE_VERSION_CLEAN for global.release.version
            CHART_PUBLISH_VERSION="${RELEASE_VERSION_CLEAN}"
            if [[ -n "<< parameters.chart_version >>" ]]; then
              CHART_PUBLISH_VERSION="<< parameters.chart_version >>"
            fi

            case "${PROVIDER}" in
              capa)         SOURCE_CHART="cluster-aws";           TARGET_CHART="release-aws" ;;
              azure)        SOURCE_CHART="cluster-azure";         TARGET_CHART="release-azure" ;;
              vsphere)      SOURCE_CHART="cluster-vsphere";       TARGET_CHART="release-vsphere" ;;
              cloud-director) SOURCE_CHART="cluster-cloud-director"; TARGET_CHART="release-cloud-director" ;;
              eks)          SOURCE_CHART="cluster-eks";           TARGET_CHART="release-eks" ;;
              proxmox)      SOURCE_CHART="cluster-proxmox";       TARGET_CHART="release-proxmox" ;;
              aks)          SOURCE_CHART="cluster-aks";           TARGET_CHART="release-aks" ;;
              *) echo "Unknown provider: ${PROVIDER}"; exit 1 ;;
            esac

            RELEASE_PATH="${PROVIDER}/${RELEASE_VERSION}"

            if [[ ! -f "${RELEASE_PATH}/release.yaml" ]]; then
              echo "Release file not found: ${RELEASE_PATH}/release.yaml"
              exit 1
            fi

            CHART_VERSION=$(yq ".spec.components[] | select(.name == \"${SOURCE_CHART}\") | .version" "${RELEASE_PATH}/release.yaml")

            if [[ -z "${CHART_VERSION}" || "${CHART_VERSION}" == "null" ]]; then
              echo "Could not find ${SOURCE_CHART} version in release.yaml"
              exit 1
            fi

            echo "Provider: ${PROVIDER}"
            echo "Source: ${SOURCE_CHART}:${CHART_VERSION} → Target: ${TARGET_CHART}:${CHART_PUBLISH_VERSION}"

            echo "export SOURCE_CHART='${SOURCE_CHART}'" >> "$BASH_ENV"
            echo "export TARGET_CHART='${TARGET_CHART}'" >> "$BASH_ENV"
            echo "export CHART_VERSION='${CHART_VERSION}'" >> "$BASH_ENV"
            echo "export RELEASE_VERSION_CLEAN='${RELEASE_VERSION_CLEAN}'" >> "$BASH_ENV"
            echo "export CHART_PUBLISH_VERSION='${CHART_PUBLISH_VERSION}'" >> "$BASH_ENV"
      - login-oci-registry
      - run:
          name: Pull and retag chart
          command: |
            set -euo pipefail

            WORK_DIR=$(mktemp -d)
            cd "${WORK_DIR}"

            helm pull "oci://gsoci.azurecr.io/charts/giantswarm/${SOURCE_CHART}" --version "${CHART_VERSION}"

            tar -xzf "${SOURCE_CHART}-${CHART_VERSION}.tgz"
            mv "${SOURCE_CHART}" "${TARGET_CHART}"

            yq -i ".name = \"${TARGET_CHART}\"" "${TARGET_CHART}/Chart.yaml"
            yq -i ".version = \"${CHART_PUBLISH_VERSION}\"" "${TARGET_CHART}/Chart.yaml"
            yq -i ".global.release.version = \"${RELEASE_VERSION_CLEAN}\"" "${TARGET_CHART}/values.yaml"

            echo "Chart name:              $(yq '.name' "${TARGET_CHART}/Chart.yaml")"
            echo "Chart version (OCI tag): $(yq '.version' "${TARGET_CHART}/Chart.yaml")"
            echo "global.release.version:  $(yq '.global.release.version' "${TARGET_CHART}/values.yaml")"

            mkdir -p ~/project/helm
            mv "${TARGET_CHART}" ~/project/helm/release-chart

            # Skip ct lint — this is a pre-built chart, already linted in its source repo.
            # ct lint fails because the helm repo for dependencies isn't configured in this CI.
            mkdir -p ~/project/.abs
            printf 'steps: [metadata, build]\n' > ~/project/.abs/main.yaml
      - persist_to_workspace:
          root: .
          paths:
            - helm/release-chart
            - .abs

  # Push the retagged chart WITHOUT letting the architect orb re-version it.
  #
  # The architect/push-to-app-catalog job runs `VERSION=$(gitsemver get)` and
  # overrides the chart version with it. On a branch build that resolves to
  # `0.0.0-dev.<branch>.<timestamp>`, which clobbers the clean release version
  # (e.g. 34.4.0) that prepare-retag-chart stamps into Chart.yaml — so no clean
  # semver tag ever gets published. We instead package with ABS (which keeps the
  # Chart.yaml version) and push via the lower-level architect/push-helm command.
  push-retag-chart:
    executor: architect/app-build-suite
    parameters:
      provider:
        type: string
      release_version:
        type: string
      chart_version:
        type: string
        default: ""
    steps:
      - checkout
      - architect/tools-info:
          show_abs_version: true
          show_architect_version: false
          show_go_version: false
      - architect/determine-catalog-name:
          app_catalog: cluster-catalog
          app_catalog_test: cluster-catalog
          on_tag: false
      - attach_workspace:
          at: .
      - run:
          name: Package retagged chart (preserve stamped version)
          command: |
            set -euo pipefail

            # Expected OCI tag: PR previews use chart_version (<ver>-<sha>);
            # merges to master use the clean release version.
            EXPECTED="<< parameters.chart_version >>"
            if [[ -z "${EXPECTED}" ]]; then
              EXPECTED="$(echo '<< parameters.release_version >>' | sed 's/^v//')"
            fi

            # No --override-chart-version: ABS uses the version stamped into
            # Chart.yaml by prepare-retag-chart.
            mkdir build
            python -m app_build_suite \
              --chart-dir ./helm/release-chart \
              --destination build \
              --generate-metadata \
              --catalog-base-url "https://giantswarm.github.io/$(cat .app_catalog_name)/" \
              --keep-chart-changes

            # Guard against a silent regression: refuse to push if the packaged
            # chart was re-versioned away from the expected release version.
            tgz=$(find build -maxdepth 1 -name '*.tgz' | head -1)
            echo "Packaged: ${tgz}"
            if ! echo "${tgz}" | grep -q "\-${EXPECTED}\.tgz$"; then
              echo "ERROR: packaged chart version does not match expected '${EXPECTED}'." >&2
              echo "Refusing to push a mis-versioned chart." >&2
              exit 1
            fi
      - architect/push-helm:
          chart: release-chart
          force-public: true
          push_to_appcatalog: true
          push_to_oci_registry: true
