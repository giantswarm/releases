name: Publish GitHub Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - "*/v*.*.*/release.yaml"
  workflow_dispatch:
    inputs:
      announce:
        description: 'Also trigger customer-facing Slack announcements (via announce-release workflow)'
        required: false
        type: boolean
        default: false

jobs:
  get-releases:
    name: Get releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get releases
        id: get-releases
        # TODO: Replace specific providers in glob with * as soon as it matches all of them anyway.
        run: |
          # Ignore providers without releases.
          shopt -s nullglob

          # Get releases.
          echo releases="$(jq --null-input --args '$ARGS.positional' --compact-output -- {azure,capa,cloud-director,eks,vsphere}/v*.*.*)" >> "${GITHUB_OUTPUT}"

    outputs:
      releases: ${{ steps.get-releases.outputs.releases }}

  create-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: get-releases

    strategy:
      matrix:
        release: ${{ fromJSON(needs.get-releases.outputs.releases) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get provider lists
        id: providers
        uses: ./.github/actions/get-providers

      - name: Get provider & version
        id: get-provider-version
        env:
          release: ${{ matrix.release }}
        run: |
          # Get provider & version.
          provider="${release%/v*.*.*}"
          version="${release#${provider}/}"

          # Map directory name to API name using centralized map
          DIR_TO_API='${{ steps.providers.outputs.dir_to_api }}'
          provider=$(echo "$DIR_TO_API" | jq -r --arg d "$provider" '.[$d] // $d')

          # Store provider & version.
          echo provider="${provider}" >> "${GITHUB_OUTPUT}"
          echo version="${version}" >> "${GITHUB_OUTPUT}"

      - name: Get release
        id: get-release
        env:
          GH_TOKEN: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}
          provider: ${{ steps.get-provider-version.outputs.provider }}
          version: ${{ steps.get-provider-version.outputs.version }}
        run: |
          # Define tag.
          tag="${provider}/${version}"

          # Determine exists.
          [ "$(gh release view "${tag}" --json id)" ] && exists=true || exists=false

          # Store tag & exists.
          echo tag="${tag}" >> "${GITHUB_OUTPUT}"
          echo exists="${exists}" >> "${GITHUB_OUTPUT}"

      - name: Create release
        if: ${{ ! fromJSON(steps.get-release.outputs.exists) }}
        env:
          GH_TOKEN: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}
          release: ${{ matrix.release }}
          provider: ${{ steps.get-provider-version.outputs.provider }}
          version: ${{ steps.get-provider-version.outputs.version }}
          tag: ${{ steps.get-release.outputs.tag }}
        run: |
          # Map title using centralized display names
          # The display_names map uses directory names as keys, so we need to look up by directory
          dir_name="${release%/v*.*.*}"
          DISPLAY_NAMES='${{ steps.providers.outputs.display_names }}'
          display=$(echo "$DISPLAY_NAMES" | jq -r --arg d "$dir_name" '.[$d] // $d')
          title="${display} ${version}"

          # Define notes & files.
          notes="${release}/README.md"
          files=("${release}/release.yaml")

          # Determine pre-release.
          [[ "${version}" == v*.*.*-* ]] && prerelease="--prerelease" || prerelease=""

          # Create release.
          gh release create --target "${GITHUB_REF_NAME}" "${tag}" --title "${title}" --notes-file "${notes}" ${files[@]} ${prerelease}

      - name: Trigger customer-facing announcements
        if: ${{ inputs.announce == true }}
        env:
          GH_TOKEN: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}
          release: ${{ matrix.release }}
          version: ${{ steps.get-provider-version.outputs.version }}
        run: |
          # Construct announce workflow input field from directory name
          # Input names match directory names: provider_capa, provider_azure, etc.
          dir_name="${release%/v*.*.*}"
          INPUT_FIELD="provider_${dir_name//-/_}"

          # Skip pre-releases
          if [[ "${version}" == v*.*.*-* ]]; then
            echo "Pre-release detected, skipping announce trigger."
            exit 0
          fi

          echo "Triggering announce-release workflow for $dir_name ($INPUT_FIELD) version $version"
          gh workflow run announce-release.yaml \
            -f "${INPUT_FIELD}=true" \
            -f "version=${version}"

  notify-news-product:
    name: Notify news-product
    runs-on: ubuntu-latest
    needs: [get-releases, create-release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get provider lists
        id: providers
        uses: ./.github/actions/get-providers

      - name: Post consolidated Slack message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          RELEASES: ${{ needs.get-releases.outputs.releases }}
          GH_TOKEN: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}
        run: |
          if [[ -z "$SLACK_BOT_TOKEN" ]]; then
            echo "Slack bot token not configured. Skipping notification."
            exit 0
          fi

          DISPLAY_NAMES='${{ steps.providers.outputs.display_names }}'

          # Group releases by version and collect provider display names
          declare -A VERSION_PROVIDERS
          declare -A VERSION_TAGS

          for release in $(echo "$RELEASES" | jq -r '.[]'); do
            dir_name="${release%/v*.*.*}"
            version="${release#${dir_name}/}"

            # Skip pre-releases
            if [[ "${version}" == v*.*.*-* ]]; then
              continue
            fi

            # Check if this release was actually created (not pre-existing)
            api_name=$(echo '${{ steps.providers.outputs.dir_to_api }}' | jq -r --arg d "$dir_name" '.[$d] // $d')
            tag="${api_name}/${version}"
            created_at=$(gh release view "$tag" --json createdAt --jq '.createdAt' 2>/dev/null || echo "")

            if [[ -z "$created_at" ]]; then
              continue
            fi

            # Check if it was created recently (within the last 30 minutes)
            created_ts=$(date -d "$created_at" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$created_at" +%s 2>/dev/null || echo "0")
            now_ts=$(date +%s)
            age=$(( now_ts - created_ts ))
            if [[ $age -gt 1800 ]]; then
              continue
            fi

            display=$(echo "$DISPLAY_NAMES" | jq -r --arg d "$dir_name" '.[$d] // $d')

            if [[ -n "${VERSION_PROVIDERS[$version]:-}" ]]; then
              VERSION_PROVIDERS[$version]="${VERSION_PROVIDERS[$version]}, ${display}"
            else
              VERSION_PROVIDERS[$version]="$display"
            fi
            VERSION_TAGS[$version]="${VERSION_TAGS[$version]:-} <https://github.com/${{ github.repository }}/releases/tag/${tag}|${display}>"
          done

          if [[ ${#VERSION_PROVIDERS[@]} -eq 0 ]]; then
            echo "No new releases to announce."
            exit 0
          fi

          # Post one message per version
          for version in "${!VERSION_PROVIDERS[@]}"; do
            providers="${VERSION_PROVIDERS[$version]}"
            tags="${VERSION_TAGS[$version]}"

            MESSAGE=":loudspeaker: *Release ${version} — Published*\n\n"
            MESSAGE+="Workload cluster release ${version} has been published for ${providers}.\n\n"
            MESSAGE+="*View releases:* ${tags}"

            echo "Posting to #news-product: Release ${version} for ${providers}"
            curl -s -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$(jq -n \
                --arg channel "news-product" \
                --arg text "Release ${version} published for ${providers}" \
                --arg mrkdwn "$MESSAGE" \
                '{channel: $channel, text: $text, blocks: [{type: "section", text: {type: "mrkdwn", text: $mrkdwn}}]}'
              )"
          done
