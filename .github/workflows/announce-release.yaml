name: Announce Release

on:
  workflow_dispatch:
    inputs:
      provider_all:
        description: 'Include all providers'
        required: false
        type: boolean
        default: false
      provider_aks:
        description: 'Include AKS provider'
        required: false
        type: boolean
        default: false
      provider_capa:
        description: 'Include AWS (CAPA) provider'
        required: false
        type: boolean
        default: false
      provider_azure:
        description: 'Include Azure (CAPZ) provider'
        required: false
        type: boolean
        default: false
      provider_cloud_director:
        description: 'Include Cloud Director (CAPVCD) provider'
        required: false
        type: boolean
        default: false
      provider_eks:
        description: 'Include EKS provider'
        required: false
        type: boolean
        default: false
      provider_proxmox:
        description: 'Include Proxmox provider'
        required: false
        type: boolean
        default: false
      provider_vsphere:
        description: 'Include vSphere (CAPV) provider'
        required: false
        type: boolean
        default: false
      provider_test:
        description: 'Test provider (for testing)'
        required: false
        type: boolean
        default: false
      channel:
        type: string
        description: 'Send the notification to a single specified channel (testing)'
        required: false
      version:
        type: string
        description: 'Semver formatted version for the announcement being made (e.g. v34.0.0)'
        required: true
      node_image_channel:
        type: string
        description: 'Channel for the vSphere node image template notification'
        required: false
        default: 'C061GTDF682'
      skip_announcements:
        type: boolean
        description: 'Skip release announcements (testing: e.g. only send the node image notification)'
        required: false
        default: false

jobs:
  gather_channels:
    name: Gather channels
    runs-on: ubuntu-latest
    outputs:
      provider_channels: ${{ steps.collect.outputs.provider_channels }}
    env:
      GH_TOKEN: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}
    steps:
      - name: Checkout installations code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: giantswarm/installations
          path: installations
          ref: master
          token: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}
      - name: Collect channels
        id: collect
        run: |
          INPUT_CHANNEL="${{ inputs.channel }}"
          PROVIDERS_ALL="${{ inputs.provider_all }}"

          # Build list of selected providers
          # Input names match directory names (aks, capa, azure, cloud-director, eks, proxmox, vsphere)
          SELECTED_PROVIDERS=()
          if [[ "$PROVIDERS_ALL" == "true" ]]; then
             SELECTED_PROVIDERS+=("aks" "capa" "azure" "cloud-director" "vsphere" "eks" "proxmox")
          else
             [[ "${{ inputs.provider_aks }}" == "true" ]] && SELECTED_PROVIDERS+=("aks")
             [[ "${{ inputs.provider_capa }}" == "true" ]] && SELECTED_PROVIDERS+=("capa")
             [[ "${{ inputs.provider_azure }}" == "true" ]] && SELECTED_PROVIDERS+=("azure")
             [[ "${{ inputs.provider_cloud_director }}" == "true" ]] && SELECTED_PROVIDERS+=("cloud-director")
             [[ "${{ inputs.provider_vsphere }}" == "true" ]] && SELECTED_PROVIDERS+=("vsphere")
             [[ "${{ inputs.provider_eks }}" == "true" ]] && SELECTED_PROVIDERS+=("eks")
             [[ "${{ inputs.provider_proxmox }}" == "true" ]] && SELECTED_PROVIDERS+=("proxmox")
             [[ "${{ inputs.provider_test }}" == "true" ]] && SELECTED_PROVIDERS+=("test")
          fi

          if [[ ${#SELECTED_PROVIDERS[@]} -eq 0 ]]; then
             echo "No providers selected"
             exit 1
          fi

          # Map directory names to installations provider names (only azure differs)
          declare -A DIR_TO_INSTALL=(["azure"]="capz")

          # Array to store provider-channel pairs
          declare -a provider_channel_pairs=()

          # If a specific channel is provided (for testing), pair it with each selected provider
          if [[ -n "$INPUT_CHANNEL" ]]; then
            for provider in "${SELECTED_PROVIDERS[@]}"; do
              provider_channel_pairs+=("{\"provider\":\"$provider\",\"channel\":\"$INPUT_CHANNEL\"}")
            done
            export OUTPUT=$(printf '%s\n' "${provider_channel_pairs[@]}" | jq -s -c .)
            echo "provider_channels=$OUTPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Special handling for test provider
          if [[ " ${SELECTED_PROVIDERS[@]} " =~ " test " ]]; then
             provider_channel_pairs+=("{\"provider\":\"test\",\"channel\":\"test-capi-events\"}")
          fi

          # Process real providers
          for provider in "${SELECTED_PROVIDERS[@]}"; do
            if [[ "$provider" == "test" ]]; then
              continue  # Already handled above
            fi

            # Add default channels for each real provider
            provider_channel_pairs+=("{\"provider\":\"$provider\",\"channel\":\"noise-releases\"}")
            provider_channel_pairs+=("{\"provider\":\"$provider\",\"channel\":\"sig-product\"}")

            # Map to installations provider name for matching
            install_provider="${DIR_TO_INSTALL[$provider]:-$provider}"

            # Find installation-specific channels for this provider
            while read -r installation; do
              FILE_PATH="$installation/cluster.yaml"
              if [[ -f "$FILE_PATH" ]]; then
                INSTALLATION_PROVIDER=$(yq -r ".provider" $FILE_PATH)
                HAS_SLACK=$(yq 'has("slack")' $FILE_PATH)

                if [[ "$install_provider" == "$INSTALLATION_PROVIDER" ]]; then
                  if [[ "$HAS_SLACK" == "true" ]]; then
                    CHANNEL=$(yq -r '.slack.support[0]' "$FILE_PATH")
                    provider_channel_pairs+=("{\"provider\":\"$provider\",\"channel\":\"$CHANNEL\"}")
                  fi
                fi
              fi
            done < <(find ./installations -type d -mindepth 1 -maxdepth 1)
          done

          # Convert to JSON array and deduplicate
          export OUTPUT=$(printf '%s\n' "${provider_channel_pairs[@]}" | jq -s -c 'unique')
          echo "provider_channels=$OUTPUT" >> "$GITHUB_OUTPUT"
  
  get_announcement:
    name: Get announcement
    runs-on: ubuntu-latest
    outputs:
      announcements: ${{ steps.get_announcement_md.outputs.announcements }}
    steps:
      - name: Get announcement.md files
        id: get_announcement_md
        run: |
          # Build list of selected providers
          PROVIDERS_ALL="${{ inputs.provider_all }}"
          # Input names match directory names (aks, capa, azure, cloud-director, eks, proxmox, vsphere)
          SELECTED_PROVIDERS=()

          if [[ "$PROVIDERS_ALL" == "true" ]]; then
             SELECTED_PROVIDERS+=("aks" "capa" "azure" "cloud-director" "vsphere" "eks" "proxmox")
          else
             [[ "${{ inputs.provider_aks }}" == "true" ]] && SELECTED_PROVIDERS+=("aks")
             [[ "${{ inputs.provider_capa }}" == "true" ]] && SELECTED_PROVIDERS+=("capa")
             [[ "${{ inputs.provider_azure }}" == "true" ]] && SELECTED_PROVIDERS+=("azure")
             [[ "${{ inputs.provider_cloud_director }}" == "true" ]] && SELECTED_PROVIDERS+=("cloud-director")
             [[ "${{ inputs.provider_vsphere }}" == "true" ]] && SELECTED_PROVIDERS+=("vsphere")
             [[ "${{ inputs.provider_eks }}" == "true" ]] && SELECTED_PROVIDERS+=("eks")
             [[ "${{ inputs.provider_proxmox }}" == "true" ]] && SELECTED_PROVIDERS+=("proxmox")
             [[ "${{ inputs.provider_test }}" == "true" ]] && SELECTED_PROVIDERS+=("test")
          fi

          if [[ ${#SELECTED_PROVIDERS[@]} -eq 0 ]]; then
             echo "No providers selected"
             exit 1
          fi

          # Fetch announcement for each provider and build JSON object
          declare -A announcements_map

          for PROVIDER in "${SELECTED_PROVIDERS[@]}"; do
            echo "Fetching announcement for provider: $PROVIDER"

            if [[ "$PROVIDER" == "test" ]]; then
              ANNOUNCEMENT_TEXT="This is a test announcement for version ${{ inputs.version }}"
            else
              # Provider names now match directory names directly
              REPO_DIR="$PROVIDER"

              LINK="https://raw.githubusercontent.com/giantswarm/releases/master/$REPO_DIR/${{ inputs.version }}/announcement.md"
              echo "Downloading from: $LINK"

              if wget -q "$LINK" -O "announcement_${PROVIDER}.md"; then
                ANNOUNCEMENT_TEXT=$(cat "announcement_${PROVIDER}.md")
              else
                echo "No announcement found for $PROVIDER ${{ inputs.version }} - skipping"
                continue
              fi
            fi

            # Store in associative array
            announcements_map["$PROVIDER"]="$ANNOUNCEMENT_TEXT"
          done

          # Build JSON object from associative array
          echo "announcements<<EOF" >> "$GITHUB_OUTPUT"
          echo "{" >> "$GITHUB_OUTPUT"
          FIRST=true
          for PROVIDER in "${!announcements_map[@]}"; do
            if [[ "$FIRST" == "false" ]]; then
              echo "," >> "$GITHUB_OUTPUT"
            fi
            FIRST=false
            # Escape the announcement text for JSON
            ESCAPED=$(echo "${announcements_map[$PROVIDER]}" | jq -Rs .)
            echo "  \"$PROVIDER\": $ESCAPED" >> "$GITHUB_OUTPUT"
          done
          echo "" >> "$GITHUB_OUTPUT"
          echo "}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
  
  send_messages:
    name: Send Messages
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_announcements }}
    needs: [gather_channels, get_announcement]
    strategy:
      matrix:
        include: ${{ fromJSON(needs.gather_channels.outputs.provider_channels) }}
    steps:
      - name: Extract announcement for provider
        id: get_provider_announcement
        run: |
          PROVIDER="${{ matrix.provider }}"
          ANNOUNCEMENTS='${{ needs.get_announcement.outputs.announcements }}'

          # Extract the announcement for this specific provider
          ANNOUNCEMENT=$(echo "$ANNOUNCEMENTS" | jq -r ".[\"$PROVIDER\"]")

          if [[ "$ANNOUNCEMENT" == "null" || -z "$ANNOUNCEMENT" ]]; then
            echo "No announcement found for provider: $PROVIDER - skipping Slack post"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Convert standard Markdown to Slack mrkdwn:
          #   **bold** -> *bold*
          #   [text](url) -> <url|text>
          ANNOUNCEMENT=$(echo "$ANNOUNCEMENT" | sed 's/\*\*\([^*]*\)\*\*/\*\1\*/g')
          ANNOUNCEMENT=$(echo "$ANNOUNCEMENT" | sed 's/\[\([^]]*\)\](\([^)]*\))/<\2|\1>/g')

          echo "announcement<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ANNOUNCEMENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Write announcements
        if: steps.get_provider_announcement.outputs.skip != 'true'
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ matrix.channel }}
            text: ${{ toJSON(steps.get_provider_announcement.outputs.announcement) }}
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ${{ toJSON(steps.get_provider_announcement.outputs.announcement) }}

  notify_node_image:
    name: Notify vSphere node image template
    runs-on: ubuntu-latest
    # Some vSphere installations cannot use the image distribution operator (IDO)
    # and must upload the node image template to vCenter manually.
    if: ${{ inputs.provider_all || inputs.provider_vsphere }}
    steps:
      - name: Determine node image requirement
        id: check
        run: |
          VERSION="${{ inputs.version }}"
          LINK="https://raw.githubusercontent.com/giantswarm/releases/master/vsphere/${VERSION}/release.diff"
          echo "Downloading release.diff from: $LINK"

          if ! wget -q "$LINK" -O release.diff; then
            echo "No release.diff found for vsphere ${VERSION} - skipping node image notification"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # release.diff is a side-by-side diff: old release on the left, new on the right.
          # Isolate the components section (everything between 'components:' and 'date:').
          COMPONENTS=$(awk '/^  components:/{f=1;next} /^  date:/{f=0} f' release.diff)

          # A change to flatcar, kubernetes or os-tooling requires a new node image template.
          CHANGED=false
          declare -A NEWV
          for comp in flatcar kubernetes os-tooling; do
            # The version line immediately follows the component name line. It carries the old
            # version (left column) and the new version (right column) on the same line.
            VLINE=$(echo "$COMPONENTS" | grep -A1 -E "name: ${comp}( |$)" | grep 'version:' | head -1)
            OLD=$(echo "$VLINE" | grep -oE 'version: [^[:space:]]+' | head -1 | awk '{print $2}')
            NEW=$(echo "$VLINE" | grep -oE 'version: [^[:space:]]+' | tail -1 | awk '{print $2}')
            NEWV[$comp]="$NEW"
            echo "${comp}: ${OLD} -> ${NEW}"
            if [[ "$OLD" != "$NEW" ]]; then
              CHANGED=true
            fi
          done

          if [[ "$CHANGED" != "true" ]]; then
            echo "No flatcar/kubernetes/os-tooling change for vsphere ${VERSION} - no node image needed"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FLATCAR="${NEWV[flatcar]}"
          KUBERNETES="${NEWV[kubernetes]}"
          TOOLING="${NEWV[os-tooling]}"

          TEMPLATE="flatcar-stable-${FLATCAR}-kube-${KUBERNETES}-tooling-${TOOLING}-gs"
          OVA="flatcar-stable-${FLATCAR}-kube-v${KUBERNETES}.ova"
          URL="https://gs-public-capi-vm-images.s3.eu-central-1.amazonaws.com/capv/${TEMPLATE}/${OVA}"

          MESSAGE=$(cat <<MSGEOF
          :announcement: <@U08523GL56D> *please upload the new VM template for release* \`${VERSION}\`

          - Log in to vCenter
          - In the VM templates Folder > *Deploy OVF Template*
          - *URL*: \`${URL}\`
          - *VM name*: \`${TEMPLATE}\`  (don't forget \`-gs\`)
          - *Compute resource*: First cluster where templates have no suffix.
          - Set disk to *thin provisioned*
          - Once uploaded, *Convert the VM to template*.

          Repeat the operation for each vSphere cluster and *append the site name to the template*. (e.g. \`flatcar-stable-4152.2.3-kube-1.31.9-tooling-1.26.1-gs-lille\` for Lille cluster).
          MSGEOF
          )

          {
            echo "message<<GHEOF"
            echo "$MESSAGE"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Send node image template notification
        if: steps.check.outputs.skip != 'true'
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ inputs.node_image_channel }}
            text: ${{ toJSON(steps.check.outputs.message) }}
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ${{ toJSON(steps.check.outputs.message) }}
