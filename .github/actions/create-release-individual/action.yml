name: 'Create Release Files (Individual)'
description: 'Creates release files for a single provider (individual releases)'
inputs:
  provider:
    description: 'Provider name'
    required: true
  version:
    description: 'Release version'
    required: true
  base:
    description: 'Base version for the release'
    required: true
  github_token:
    description: 'GitHub token for devctl'
    required: true
  devctl_version:
    description: 'Version of devctl being used'
    required: true
outputs:
  log_content:
    description: 'Log content from release creation'
    value: ${{ steps.create.outputs.log_content }}
runs:
  using: "composite"
  steps:
    - name: Create release files
      id: create
      shell: bash
      env:
        OPSCTL_GITHUB_TOKEN: ${{ inputs.github_token }}
        GH_TOKEN: ${{ inputs.github_token }}
        DEVCTL_UNSAFE_FORCE_VERSION: ${{ inputs.devctl_version }}
        DEVCTL_GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        set -o pipefail
        devctl release create \
          --base "${{ inputs.base }}" \
          --name "${{ inputs.version }}" \
          --provider "${{ inputs.provider }}" \
          --bumpall --overwrite -y --output markdown --changes-only 2>&1 | tee /tmp/release_output.log

        # Post-process output: keep warnings and components visible, collapse apps table
        RAW=$(cat /tmp/release_output.log)

        # Extract warnings (lines starting with ⚠️ or whitespace-indented lines after them)
        WARNINGS=$(echo "$RAW" | awk '/^⚠️/{p=1} p{print} /^$/ && p{p=0}')

        # Extract components table (starts with "| COMPONENT NAME")
        COMPONENTS=$(echo "$RAW" | awk '/^\| COMPONENT NAME/{found=1} found{print} found && /^$/{exit}')

        # Extract apps table (starts with "| APP NAME")
        APPS=$(echo "$RAW" | awk '/^\| APP NAME/{found=1} found && /^\| COMPONENT NAME/{exit} found{print}')
        APP_COUNT=$(echo "$APPS" | grep -c '^|' || true)  # grep returns 1 if no matches
        APP_COUNT=$((APP_COUNT > 2 ? APP_COUNT - 2 : 0))  # subtract header + separator

        # Build formatted output
        FORMATTED=""

        if [[ -n "$WARNINGS" ]]; then
          FORMATTED="${WARNINGS}"$'\n\n'
        fi

        if [[ -n "$COMPONENTS" ]]; then
          FORMATTED="${FORMATTED}${COMPONENTS}"$'\n\n'
        fi

        if [[ -n "$APPS" ]]; then
          FORMATTED="${FORMATTED}<details>"$'\n'
          FORMATTED="${FORMATTED}<summary><strong>Apps</strong> (${APP_COUNT} updated)</summary>"$'\n\n'
          FORMATTED="${FORMATTED}${APPS}"$'\n\n'
          FORMATTED="${FORMATTED}</details>"
        fi

        echo "LOG_CONTENT<<EOF" >> "$GITHUB_ENV"
        echo "$FORMATTED" >> "$GITHUB_ENV"
        echo "EOF" >> "$GITHUB_ENV"

