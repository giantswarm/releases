name: 'Get Provider Lists'
description: 'Provides centralized provider lists and name mappings'
outputs:
  all_providers:
    description: 'All API provider names (space-separated)'
    value: 'aks aws azure cloud-director eks proxmox vsphere'
  provider_dirs:
    description: 'Provider directory names (space-separated, uses "capa" not "aws")'
    value: 'aks azure capa cloud-director eks proxmox vsphere'
  dir_to_api:
    description: 'JSON map: directory name → API/devctl name'
    value: '{"aks":"aks","capa":"aws","azure":"azure","cloud-director":"cloud-director","eks":"eks","proxmox":"proxmox","vsphere":"vsphere"}'
  api_to_dir:
    description: 'JSON map: API/devctl name → directory name'
    value: '{"aks":"aks","aws":"capa","azure":"azure","cloud-director":"cloud-director","eks":"eks","proxmox":"proxmox","vsphere":"vsphere"}'
  display_names:
    description: 'JSON map: directory name → human display name'
    value: '{"aks":"AKS","capa":"AWS","azure":"Azure","cloud-director":"VMware Cloud Director","eks":"EKS","proxmox":"Proxmox","vsphere":"vSphere"}'
  capi_names:
    description: 'JSON map: directory name → CAPI-style display name'
    value: '{"aks":"AKS","capa":"CAPA","azure":"CAPZ","cloud-director":"CAPVCD","eks":"EKS","proxmox":"CAPMOX","vsphere":"CAPV"}'
runs:
  using: "composite"
  steps:
    - name: Provider lists are available as outputs
      shell: bash
      run: |
        echo "Provider lists and mappings loaded:"
        echo "  - all_providers: aks aws azure cloud-director eks proxmox vsphere"
        echo "  - provider_dirs: aks azure capa cloud-director eks proxmox vsphere"
        echo "  - dir_to_api: directory name → API name (JSON)"
        echo "  - api_to_dir: API name → directory name (JSON)"
        echo "  - display_names: directory name → human display name (JSON)"
        echo "  - capi_names: directory name → CAPI-style display name (JSON)"
